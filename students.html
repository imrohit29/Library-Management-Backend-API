<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Library Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Library Admin</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="books.html">Books</a></li>
            <li><a href="students.html" class="active">Students</a></li>
            <li><a href="issue.html">Issue Book</a></li>
            <li><a href="return.html">Return Book</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="main-content">
        <div class="header-top">
            <h1 class="page-title">Manage Students</h1>
            <button class="btn btn-primary" onclick="toggleAddForm()">+ Add Student</button>
        </div>

        <div id="addStudentFormContainer" class="hidden mb-4">
            <form id="addStudentForm" class="card-form">
                <h3 class="mb-3">Add New Student</h3>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="s_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="s_email" class="form-control" required>
                </div>
                <div class="form-group mb-4">
                    <label>Phone</label>
                    <input type="text" id="s_phone" class="form-control" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Student</button>
                    <button type="button" class="btn" onclick="toggleAddForm()" style="background:var(--border-color)">Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Join Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Injected by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        function toggleAddForm() {
            document.getElementById('addStudentFormContainer').classList.toggle('hidden');
        }

        async function loadStudents() {
            try {
                const students = await Api.get('/students');
                const tbody = document.querySelector('#studentsTable tbody');
                tbody.innerHTML = students.map(s => `
                    <tr>
                        <td>${s.id}</td>
                        <td><strong>${s.student_id}</strong></td>
                        <td>${s.name}</td>
                        <td>${s.email}</td>
                        <td>${s.phone}</td>
                        <td>${s.created_at.split('T')[0]}</td>
                        <td>
                            <button class="badge badge-danger" style="border:none; cursor:pointer;" onclick="deleteStudent(${s.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast('Failed to load students', 'error');
            }
        }

        async function deleteStudent(id) {
            if(!confirm('Are you sure you want to delete this student?')) return;
            try {
                await Api.delete(`/students/${id}`);
                showToast('Student deleted');
                loadStudents();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentData = {
                name: document.getElementById('s_name').value,
                email: document.getElementById('s_email').value,
                phone: document.getElementById('s_phone').value
            };

            try {
                await Api.post('/students', studentData);
                showToast('Student added successfully');
                document.getElementById('addStudentForm').reset();
                toggleAddForm();
                loadStudents();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', loadStudents);
    </script>
</body>
</html>

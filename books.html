<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Library Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Library Admin</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="books.html" class="active">Books</a></li>
            <li><a href="students.html">Students</a></li>
            <li><a href="issue.html">Issue Book</a></li>
            <li><a href="return.html">Return Book</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="main-content">
        <div class="header-top">
            <h1 class="page-title">Manage Books</h1>
            <button class="btn btn-primary" onclick="toggleAddForm()">+ Add Book</button>
        </div>

        <!-- Add Book Form -->
        <div id="addBookFormContainer" class="hidden mb-4">
            <form id="addBookForm" class="card-form">
                <h3 class="mb-3">Add New Book</h3>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="b_title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="b_author" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" id="b_isbn" class="form-control" required>
                </div>
                <div class="form-group mb-4">
                    <label>Total Copies</label>
                    <input type="number" id="b_copies" class="form-control" min="1" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Book</button>
                    <button type="button" class="btn" onclick="toggleAddForm()" style="background:var(--border-color)">Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <table id="booksTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th>Copies</th>
                        <th>Available</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        function toggleAddForm() {
            document.getElementById('addBookFormContainer').classList.toggle('hidden');
        }

        async function loadBooks() {
            try {
                const books = await Api.get('/books');
                const tbody = document.querySelector('#booksTable tbody');
                tbody.innerHTML = books.map(b => `
                    <tr>
                        <td>${b.id}</td>
                        <td>${b.title}</td>
                        <td>${b.author}</td>
                        <td>${b.isbn}</td>
                        <td>${b.total_copies}</td>
                        <td><span class="badge ${b.available_copies > 0 ? 'badge-success' : 'badge-danger'}">${b.available_copies}</span></td>
                        <td>
                            <button class="badge badge-danger" style="border:none; cursor:pointer;" onclick="deleteBook(${b.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast('Failed to load books', 'error');
            }
        }

        async function deleteBook(id) {
            if(!confirm('Are you sure you want to delete this book?')) return;
            try {
                await Api.delete(`/books/${id}`);
                showToast('Book deleted');
                loadBooks();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        document.getElementById('addBookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const bookData = {
                title: document.getElementById('b_title').value,
                author: document.getElementById('b_author').value,
                isbn: document.getElementById('b_isbn').value,
                total_copies: parseInt(document.getElementById('b_copies').value)
            };

            try {
                await Api.post('/books', bookData);
                showToast('Book added successfully');
                document.getElementById('addBookForm').reset();
                toggleAddForm();
                loadBooks();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>
</html>
